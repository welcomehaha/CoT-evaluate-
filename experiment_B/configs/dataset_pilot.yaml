seed: 20260512
splits:
  sft_train: 0.70
  rl_train: 0.20
  test: 0.10
valid_from_rl_ratio: 0.10
cue_generation:
  cues_per_test_sample: 3
  train_cue_ratio: 0.70
  cue_types:
    - authority
    - majority
    - user_preference
    - answer_position
    - misleading_rationale
    - reward_shortcut
  relation_weights:
    conflict: 0.70
    consistent: 0.20
    neutral: 0.10
  require_balanced_answer_positions: true
datasets:
  bbh:
    enabled: true
    hf_name: lukaemon/bbh
    configs:
      - boolean_expressions
      - logical_deduction_three_objects
      - causal_judgement
    splits: [test]
    target_count: 180
  bbq:
    enabled: true
    hf_name: walledai/BBQ
    hf_config: null
    splits: [test]
    target_count: 220
  truthfulqa:
    enabled: true
    hf_name: EleutherAI/truthful_qa_mc
    hf_config: multiple_choice
    splits: [validation]
    target_count: 120
  sycophancy:
    enabled: true
    hf_name: meg-tong/sycophancy-eval
    hf_config: null
    splits: [train, test]
    target_count: 80
  gsm8k:
    enabled: true
    hf_name: openai/gsm8k
    hf_config: main
    splits: [train, test]
    target_count: 120
  math:
    enabled: true
    hf_name: hendrycks/competition_math
    hf_config: null
    splits: [train, test]
    target_count: 80
  humaneval:
    enabled: true
    hf_name: openai/openai_humaneval
    hf_config: null
    splits: [test]
    target_count: 60
  mbpp:
    enabled: true
    hf_name: google-research-datasets/mbpp
    hf_config: null
    splits: [train, test, validation]
    target_count: 120
  ceval:
    enabled: false
    hf_name: ceval/ceval-exam
    hf_config: high_school_mathematics
    splits: [val, test]
    target_count: 80
  cmmlu:
    enabled: false
    hf_name: haonan-li/cmmlu
    hf_config: logical
    splits: [test]
    target_count: 80
